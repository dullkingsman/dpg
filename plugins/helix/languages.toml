[[language]]
name              = "dpg"
scope             = "source.dpg"
file-types        = ["dpg"]
comment-token     = "--"
block-comment-tokens = { start = "/*", end = "*/" }
auto-format       = true
indent            = { tab-width = 4, unit = "    " }

formatter = { command = "dpg", args = ["fmt", "--stdin"] }

# Requires dpg-lsp on $PATH — download from https://github.com/dullkingsman/dpg/releases
language-servers = ["dpg-lsp"]

# Tree-sitter grammar — add to your languages.toml or wait for upstream inclusion.
# Requires Helix 24.03+ for subdir support.
# Update rev to the latest grammar-v* tag: https://github.com/dullkingsman/dpg/releases
[language.grammar]
source = { git = "https://github.com/dullkingsman/dpg", rev = "grammar-v0.1.0", subdir = "lang/grammar" }

[language-server.dpg-lsp]
command = "dpg-lsp"
args    = ["--stdio"]
