baseURL = "https://dullkingsman.github.io/dpg/"
title = "DPG — Declarative PG"
enableRobotsTXT = true
publishDir = "../core/internal/docssite/public"

[outputs]
  home = ["HTML", "RSS"]

[module]
  proxy = "https://proxy.golang.org,direct"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "../rfc"
    target = "content/rfc"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "github"
