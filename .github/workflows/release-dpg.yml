name: Release / DPG

on:
  workflow_call:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-docs:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Generate CLI documentation
        working-directory: core
        run: go run ./tools/gendocs --output ../site/content/docs/cli

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - uses: actions/cache@v4
        with:
          path: ~/.cache/hugo_cache
          key: hugo-${{ hashFiles('site/go.sum') }}
          restore-keys: hugo-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PostCSS dependencies
        working-directory: site
        run: npm install

      - name: Set release versions
        run: |
          echo "DOCS_VERSION=$(cat site/VERSION)" >> $GITHUB_ENV
          echo "DPG_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          LSP_TAG=$(git describe --tags --match 'lsp-v*' --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$LSP_TAG" ]]; then
            echo "LSP_VERSION=${LSP_TAG#lsp-}" >> $GITHUB_ENV
          else
            echo "LSP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Build Hugo site
        working-directory: site
        run: hugo --minify
        env:
          HUGO_BASEURL: "https://dullkingsman.github.io/dpg/"
          HUGO_PARAMS_DOCSVERSION: ${{ env.DOCS_VERSION }}
          HUGO_PARAMS_DPGVERSION: ${{ env.DPG_VERSION }}
          HUGO_PARAMS_LSPVERSION: ${{ env.LSP_VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: docssite
          path: core/internal/docssite/public/
          if-no-files-found: error

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    needs: prepare-docs

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive: dpg-linux-amd64.tar.gz

          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            archive: dpg-linux-arm64.tar.gz

          - runner: macos-14
            goos: darwin
            goarch: amd64
            archive: dpg-darwin-amd64.tar.gz

          - runner: macos-latest
            goos: darwin
            goarch: arm64
            archive: dpg-darwin-arm64.tar.gz

          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive: dpg-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Download documentation site
        uses: actions/download-artifact@v4
        with:
          name: docssite
          path: core/internal/docssite/public/

      - name: Build (Unix)
        if: matrix.goos != 'windows'
        working-directory: core
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg/internal/version.Version=${{ github.ref_name }}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Commit=${GITHUB_SHA:0:7}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          go build -tags embeddata -trimpath -ldflags "$LDFLAGS" -o dist/dpg ./cmd/dpg
          cd dist && tar czf ${{ matrix.archive }} dpg

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        working-directory: core
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: gcc
        run: |
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg/internal/version.Version=${{ github.ref_name }}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Commit=${GITHUB_SHA:0:7}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          go build -tags embeddata -trimpath -ldflags "$LDFLAGS" -o dist/dpg.exe ./cmd/dpg
          cd dist && 7z a ${{ matrix.archive }} dpg.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: core/dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: 'dpg-*'

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
