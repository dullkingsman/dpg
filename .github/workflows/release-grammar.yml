name: Release / Grammar

on:
  push:
    tags:
      - 'grammar-v[0-9]*.[0-9]*.[0-9]*'
  workflow_call:
    inputs:
      tag:
        description: 'grammar-v* tag to release (e.g. grammar-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-meta:
    name: Resolve tag metadata
    runs-on: ubuntu-latest
    outputs:
      tag:        ${{ steps.meta.outputs.tag }}
      version:    ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#grammar-v}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  generate:
    name: Generate parser
    needs: resolve-meta
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lang/grammar/package.json

      - name: Install dependencies
        working-directory: lang/grammar
        run: npm install

      - name: Generate parser
        working-directory: lang/grammar
        run: npx tree-sitter generate

      - uses: actions/upload-artifact@v4
        with:
          name: grammar-src
          path: lang/grammar/src/
          if-no-files-found: error

  # GitHub Release — uploads parser.c and node-types.json as pinned assets.
  # Helix and other tools that clone the grammar can pin to a grammar-v* tag.
  release:
    name: Create GitHub Release
    needs: [resolve-meta, generate]
    runs-on: ubuntu-latest

    steps:
      - name: Download generated parser
        uses: actions/download-artifact@v4
        with:
          name: grammar-src
          path: grammar-src/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-meta.outputs.tag }}
          draft: false
          prerelease: ${{ needs.resolve-meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            grammar-src/parser.c
            grammar-src/scanner.c
            grammar-src/node-types.json

  publish-npm:
    name: Publish to npm
    needs: [resolve-meta, generate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: lang/grammar/package.json

      - name: Download generated parser
        uses: actions/download-artifact@v4
        with:
          name: grammar-src
          path: lang/grammar/src/

      - name: Stamp version
        working-directory: lang/grammar
        run: npm version "${{ needs.resolve-meta.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        working-directory: lang/grammar
        run: npm install

      - name: Publish
        working-directory: lang/grammar
        run: npm publish --access public --provenance

  publish-crate:
    name: Publish to crates.io
    needs: resolve-meta
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        working-directory: lang/grammar
        run: sed -i "s/^version = .*/version = \"${{ needs.resolve-meta.outputs.version }}\"/" Cargo.toml

      - name: Publish
        working-directory: lang/grammar
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty

  build-wheels:
    name: Build Python wheels (${{ matrix.os }})
    needs: resolve-meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        working-directory: lang/grammar
        shell: bash
        run: |
          sed -i.bak "s/^version = .*/version = \"${{ needs.resolve-meta.outputs.version }}\"/" pyproject.toml
          rm -f pyproject.toml.bak

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: lang/grammar
          output-dir: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}
          path: dist/

  build-sdist:
    name: Build source distribution
    needs: resolve-meta
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        working-directory: lang/grammar
        run: sed -i "s/^version = .*/version = \"${{ needs.resolve-meta.outputs.version }}\"/" pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        working-directory: lang/grammar
        run: |
          pip install build
          python -m build --sdist --outdir ../../dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/

  upload-pypi:
    name: Upload to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}
