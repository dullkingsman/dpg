name: Release / Neovim

on:
  push:
    tags:
      - 'nvim-v[0-9]*.[0-9]*.[0-9]*'
  workflow_call:
    inputs:
      tag:
        description: 'nvim-v* tag to release (e.g. nvim-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag metadata
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#nvim-v}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          body: |
            Install with any Neovim plugin manager pointing at the monorepo:

            **lazy.nvim**
            ```lua
            {
              "dullkingsman/dpg",
              tag = "${{ steps.meta.outputs.tag }}",
              subdir = "plugins/nvim",
              config = function() require("dpg").setup() end,
            }
            ```

            **packer.nvim**
            ```lua
            use { "dullkingsman/dpg", tag = "${{ steps.meta.outputs.tag }}", rtp = "plugins/nvim" }
            ```
