name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  dpg:
    name: Build and release DPG
    uses: ./.github/workflows/release-dpg.yml
    permissions:
      contents: write

  check-plugins:
    name: Find latest plugin tags
    runs-on: ubuntu-latest
    outputs:
      vscode-tag:   ${{ steps.find.outputs.vscode_tag }}
      idea-tag:     ${{ steps.find.outputs.idea_tag }}
      lsp-tag:      ${{ steps.find.outputs.lsp_tag }}
      nvim-tag:     ${{ steps.find.outputs.nvim_tag }}
      grammar-tag:  ${{ steps.find.outputs.grammar_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest plugin tags
        id: find
        run: |
          for prefix in vscode idea lsp nvim grammar; do
            TAG=$(git tag --list "${prefix}-v*" --sort=-version:refname | head -1)
            if [[ -n "$TAG" ]]; then
              echo "${prefix}_tag=$TAG" >> $GITHUB_OUTPUT
            fi
          done

  publish-vscode:
    name: Publish VS Code extension
    needs: check-plugins
    if: needs.check-plugins.outputs.vscode-tag != ''
    uses: ./.github/workflows/release-vscode.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.check-plugins.outputs.vscode-tag }}
    secrets: inherit

  publish-idea:
    name: Publish JetBrains plugin
    needs: check-plugins
    if: needs.check-plugins.outputs.idea-tag != ''
    uses: ./.github/workflows/release-idea.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.check-plugins.outputs.idea-tag }}
    secrets: inherit

  publish-lsp:
    name: Release LSP
    needs: check-plugins
    if: needs.check-plugins.outputs.lsp-tag != ''
    uses: ./.github/workflows/release-lsp.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.check-plugins.outputs.lsp-tag }}
    secrets: inherit

  publish-nvim:
    name: Release Neovim plugin
    needs: check-plugins
    if: needs.check-plugins.outputs.nvim-tag != ''
    uses: ./.github/workflows/release-nvim.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.check-plugins.outputs.nvim-tag }}
    secrets: inherit

  publish-grammar:
    name: Release Grammar
    needs: check-plugins
    if: needs.check-plugins.outputs.grammar-tag != ''
    uses: ./.github/workflows/release-grammar.yml
    permissions:
      contents: write
      id-token: write
    with:
      tag: ${{ needs.check-plugins.outputs.grammar-tag }}
    secrets: inherit

  update-homebrew:
    name: Update Homebrew tap
    needs: dpg
    # Only stable releases — skip pre-releases (v0.5.2-alpha.4 etc.)
    if: "!contains(github.ref_name, '-')"
    uses: ./.github/workflows/release-homebrew.yml
    secrets: inherit
