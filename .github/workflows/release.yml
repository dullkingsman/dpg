name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build the Hugo documentation site once; all platform builds download and embed it.
  prepare-docs:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Generate CLI documentation
        working-directory: core
        run: go run ./tools/gendocs --output ../site/content/docs/cli

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - uses: actions/cache@v4
        with:
          path: ~/.cache/hugo_cache
          key: hugo-${{ hashFiles('site/go.sum') }}
          restore-keys: hugo-


      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PostCSS dependencies
        run: npm install
        working-directory: site

      - name: Set release versions
        run: |
          echo "DOCS_VERSION=$(cat site/VERSION)" >> $GITHUB_ENV
          echo "DPG_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          LSP_TAG=$(git describe --tags --match 'lsp-v*' --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$LSP_TAG" ]]; then
            echo "LSP_VERSION=${LSP_TAG#lsp-}" >> $GITHUB_ENV
          else
            echo "LSP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Build Hugo site
        run: hugo --minify
        working-directory: site
        env:
          HUGO_BASEURL: "https://dullkingsman.github.io/dpg/"
          HUGO_PARAMS_DOCSVERSION: ${{ env.DOCS_VERSION }}
          HUGO_PARAMS_DPGVERSION: ${{ env.DPG_VERSION }}
          HUGO_PARAMS_LSPVERSION: ${{ env.LSP_VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: docssite
          path: core/internal/docssite/public/
          if-no-files-found: error

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    needs: prepare-docs

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive: dpg-linux-amd64.tar.gz

          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            archive: dpg-linux-arm64.tar.gz

          - runner: macos-14
            goos: darwin
            goarch: amd64
            archive: dpg-darwin-amd64.tar.gz

          - runner: macos-latest
            goos: darwin
            goarch: arm64
            archive: dpg-darwin-arm64.tar.gz

          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive: dpg-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Download documentation site
        uses: actions/download-artifact@v4
        with:
          name: docssite
          path: core/internal/docssite/public/

      - name: Build (Unix)
        if: matrix.goos != 'windows'
        working-directory: core
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg/internal/version.Version=${{ github.ref_name }}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Commit=${GITHUB_SHA:0:7}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          go build -tags embeddata -trimpath -ldflags "$LDFLAGS" -o dist/dpg ./cmd/dpg
          cd dist && tar czf ${{ matrix.archive }} dpg

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        working-directory: core
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: gcc
        run: |
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg/internal/version.Version=${{ github.ref_name }}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Commit=${GITHUB_SHA:0:7}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          go build -tags embeddata -trimpath -ldflags "$LDFLAGS" -o dist/dpg.exe ./cmd/dpg
          cd dist && 7z a ${{ matrix.archive }} dpg.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: core/dist/${{ matrix.archive }}
          if-no-files-found: error

  build-lsp:
    name: Build dpg-lsp (all platforms)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: lang/lsp/go.mod
          cache-dependency-path: lang/lsp/go.sum

      - name: Build dpg-lsp
        working-directory: lang/lsp
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          COMMIT="${GITHUB_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg-lsp/internal/version.Version=${VERSION}' \
            -X 'github.com/dullkingsman/dpg-lsp/internal/version.Commit=${COMMIT}' \
            -X 'github.com/dullkingsman/dpg-lsp/internal/version.Date=${DATE}'"

          mkdir -p dist

          targets=(
            "linux   amd64 dpg-lsp-linux-amd64.tar.gz"
            "linux   arm64 dpg-lsp-linux-arm64.tar.gz"
            "darwin  amd64 dpg-lsp-darwin-amd64.tar.gz"
            "darwin  arm64 dpg-lsp-darwin-arm64.tar.gz"
            "windows amd64 dpg-lsp-windows-amd64.zip"
          )

          for entry in "${targets[@]}"; do
            read -r os arch archive <<< "$entry"
            if [ "$os" = "windows" ]; then
              bin="dpg-lsp.exe"
            else
              bin="dpg-lsp"
            fi
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "$LDFLAGS" -o "dist/$bin" ./cmd/dpg-lsp
            if [ "$os" = "windows" ]; then
              (cd dist && zip "$archive" "$bin" && rm "$bin")
            else
              (cd dist && tar czf "$archive" "$bin" && rm "$bin")
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dpg-lsp-archives
          path: lang/lsp/dist/dpg-lsp-*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build, build-lsp]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: 'dpg-*'

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  check-editors:
    name: Find unreleased editor tags
    runs-on: ubuntu-latest
    outputs:
      vscode-tag: ${{ steps.find.outputs.vscode_tag }}
      idea-tag: ${{ steps.find.outputs.idea_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect unreleased vscode-v* and idea-v* tags
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for prefix in vscode idea; do
            TAG=$(git tag --list "${prefix}-v*" --sort=-version:refname | head -1)
            if [[ -n "$TAG" ]] && ! gh release view "$TAG" --json tagName &>/dev/null; then
              echo "${prefix}_tag=$TAG" >> $GITHUB_OUTPUT
            fi
          done

  publish-vscode:
    name: Publish VS Code extension
    needs: check-editors
    if: needs.check-editors.outputs.vscode-tag != ''
    uses: ./.github/workflows/vscode-release.yml
    with:
      tag: ${{ needs.check-editors.outputs.vscode-tag }}
    secrets: inherit

  publish-idea:
    name: Publish JetBrains plugin
    needs: check-editors
    if: needs.check-editors.outputs.idea-tag != ''
    uses: ./.github/workflows/idea-release.yml
    with:
      tag: ${{ needs.check-editors.outputs.idea-tag }}
    secrets: inherit

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    # Only stable releases — skip pre-releases (v0.5.2-alpha.4 etc.)
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo dullkingsman/dpg \
            --pattern checksums.txt \
            --output checksums.txt

      - name: Generate formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          python3 scripts/homebrew/update-formula.py \
            "$VERSION" \
            checksums.txt \
            scripts/homebrew/dpg.rb.tmpl \
            Formula/dpg.rb

      - name: Push to tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/dullkingsman/homebrew-dpg.git" \
            tap
          cp Formula/dpg.rb tap/Formula/dpg.rb
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/dpg.rb
          git commit -m "chore: bump dpg to v${VERSION}"
          git push
