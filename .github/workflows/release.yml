name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive: dpg-linux-amd64.tar.gz

          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            use_zig: true
            archive: dpg-linux-arm64.tar.gz

          - runner: macos-13
            goos: darwin
            goarch: amd64
            archive: dpg-darwin-amd64.tar.gz

          - runner: macos-latest
            goos: darwin
            goarch: arm64
            archive: dpg-darwin-arm64.tar.gz

          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive: dpg-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Zig (linux/arm64 cross-compilation)
        if: matrix.use_zig
        uses: mlugg/setup-zig@v1

      - name: Build (Unix)
        if: matrix.goos != 'windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            export CC="zig cc -target aarch64-linux-musl"
          fi
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg/internal/version.Version=${{ github.ref_name }}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Commit=${GITHUB_SHA:0:7}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          go build -trimpath -ldflags "$LDFLAGS" -o dist/dpg ./cmd/dpg
          cd dist && tar czf ${{ matrix.archive }} dpg

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: gcc
        run: |
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg/internal/version.Version=${{ github.ref_name }}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Commit=${GITHUB_SHA:0:7}' \
            -X 'github.com/dullkingsman/dpg/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          go build -trimpath -ldflags "$LDFLAGS" -o dist/dpg.exe ./cmd/dpg
          cd dist && 7z a ${{ matrix.archive }} dpg.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
