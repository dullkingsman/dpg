name: Editor / VS Code

on:
  push:
    branches: [master]
    paths:
      - "plugins/vscode/**"
      - "lang/syntaxes/**"
      - "lang/language-configuration.json"
  pull_request:
    branches: [master]
    paths:
      - "plugins/vscode/**"
      - "lang/syntaxes/**"
      - "lang/language-configuration.json"

jobs:
  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugins/vscode/package-lock.json

      - name: Install dependencies
        working-directory: plugins/vscode
        run: npm ci

      - name: Type-check
        working-directory: plugins/vscode
        run: npm run compile
