name: Build Documentation Site

on:
  workflow_call:
    inputs:
      docs_version:
        required: true
        type: string
      dpg_version:
        required: true
        type: string
      lsp_version:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Generate CLI documentation
        working-directory: core
        run: go run ./tools/gendocs --output ../site/content/docs/cli

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - uses: actions/cache@v4
        with:
          path: ~/.cache/hugo_cache
          key: hugo-${{ hashFiles('site/go.sum') }}
          restore-keys: hugo-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PostCSS dependencies
        working-directory: site
        run: npm install

      - name: Build Hugo site
        working-directory: site
        run: hugo --minify
        env:
          HUGO_BASEURL: "https://dullkingsman.github.io/dpg/"
          HUGO_PARAMS_DOCSVERSION: ${{ inputs.docs_version }}
          HUGO_PARAMS_DPGVERSION: ${{ inputs.dpg_version }}
          HUGO_PARAMS_LSPVERSION: ${{ inputs.lsp_version }}

      - uses: actions/upload-artifact@v4
        with:
          name: docssite
          path: core/internal/docssite/public/
          if-no-files-found: error
