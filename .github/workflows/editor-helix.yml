name: Editor / Helix

on:
  push:
    branches: [master]
    paths:
      - "plugins/helix/**"
  pull_request:
    branches: [master]
    paths:
      - "plugins/helix/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  helix:
    name: Helix config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate languages.toml
        working-directory: plugins/helix
        run: bash validate.sh
