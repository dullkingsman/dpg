name: Deploy Documentation

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate CLI documentation
        run: go run ./tools/gendocs --output website/content/docs/cli

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - uses: actions/cache@v4
        with:
          path: ~/.cache/hugo_cache
          key: hugo-${{ hashFiles('website/go.mod') }}
          restore-keys: hugo-

      - name: Download Hugo modules (Docsy)
        run: hugo mod get github.com/google/docsy@v0.15.0
        working-directory: website

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PostCSS dependencies
        run: npm install
        working-directory: website

      - name: Build Hugo site
        run: hugo --minify
        working-directory: website
        env:
          HUGO_BASEURL: "https://dullkingsman.github.io/dpg/"

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: internal/docssite/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
