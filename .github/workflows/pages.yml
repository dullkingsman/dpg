name: Deploy Documentation

on:
  push:
    branches: [master]
    tags:
      - 'docs-v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Generate CLI documentation
        working-directory: core
        run: go run ./tools/gendocs --output ../site/content/docs/cli

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - uses: actions/cache@v4
        with:
          path: ~/.cache/hugo_cache
          key: hugo-${{ hashFiles('site/go.sum') }}
          restore-keys: hugo-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PostCSS dependencies
        run: npm install
        working-directory: site

      - name: Resolve versions
        run: |
          if [[ "$GITHUB_REF_NAME" == docs-v* ]]; then
            echo "DOCS_VERSION=${GITHUB_REF_NAME#docs-}" >> $GITHUB_ENV
          else
            echo "DOCS_VERSION=$(cat site/VERSION)" >> $GITHUB_ENV
          fi
          echo "DPG_VERSION=$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || echo dev)" >> $GITHUB_ENV
          LSP_TAG=$(git describe --tags --match 'lsp-v*' --abbrev=0 2>/dev/null || echo "lsp-dev")
          echo "LSP_VERSION=${LSP_TAG#lsp-}" >> $GITHUB_ENV

      - name: Build Hugo site
        run: hugo --minify
        working-directory: site
        env:
          HUGO_BASEURL: "https://dullkingsman.github.io/dpg/"
          HUGO_PARAMS_DOCSVERSION: ${{ env.DOCS_VERSION }}
          HUGO_PARAMS_DPGVERSION: ${{ env.DPG_VERSION }}
          HUGO_PARAMS_LSPVERSION: ${{ env.LSP_VERSION }}

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: core/internal/docssite/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
