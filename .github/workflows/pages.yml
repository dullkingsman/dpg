name: Deploy Documentation

on:
  push:
    branches: [master]
    tags:
      - 'docs-v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-versions:
    name: Resolve versions
    runs-on: ubuntu-latest
    outputs:
      docs_version: ${{ steps.v.outputs.docs_version }}
      dpg_version:  ${{ steps.v.outputs.dpg_version }}
      lsp_version:  ${{ steps.v.outputs.lsp_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve versions
        id: v
        run: |
          if [[ "$GITHUB_REF_NAME" == docs-v* ]]; then
            echo "docs_version=${GITHUB_REF_NAME#docs-}" >> $GITHUB_OUTPUT
          else
            echo "docs_version=$(cat site/VERSION)" >> $GITHUB_OUTPUT
          fi
          echo "dpg_version=$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || echo dev)" >> $GITHUB_OUTPUT
          LSP_TAG=$(git describe --tags --match 'lsp-v*' --abbrev=0 2>/dev/null || echo "lsp-dev")
          echo "lsp_version=${LSP_TAG#lsp-}" >> $GITHUB_OUTPUT

  build:
    name: Build documentation
    needs: resolve-versions
    uses: ./.github/workflows/build-docs.yml
    with:
      docs_version: ${{ needs.resolve-versions.outputs.docs_version }}
      dpg_version:  ${{ needs.resolve-versions.outputs.dpg_version }}
      lsp_version:  ${{ needs.resolve-versions.outputs.lsp_version }}

  package:
    name: Package for GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docssite
          path: public/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: package
    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
