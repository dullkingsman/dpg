name: CI / Neovim

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nvim:
    name: Neovim plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Build dpg
        working-directory: core
        run: go build -o /usr/local/bin/dpg ./cmd/dpg

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.4

      - name: Install plenary.nvim
        run: git clone --depth 1 https://github.com/nvim-lua/plenary.nvim /tmp/plenary

      - name: Run tests
        run: make test-nvim
