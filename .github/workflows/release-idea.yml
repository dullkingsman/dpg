name: Release / IntelliJ

on:
  push:
    tags:
      - 'idea-v[0-9]*.[0-9]*.[0-9]*'
  workflow_call:
    inputs:
      tag:
        description: 'idea-v* tag to publish (e.g. idea-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build and publish JetBrains plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag metadata
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#idea-v}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "prerelease=true"  >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Stamp version
        working-directory: plugins/idea
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.meta.outputs.version }}\"/" build.gradle.kts

      - name: Build and verify plugin
        working-directory: plugins/idea
        run: ./gradlew build verifyPlugin --no-daemon

      - name: Publish to JetBrains Marketplace
        working-directory: plugins/idea
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: |
          output=$(./gradlew publishPlugin --no-daemon 2>&1) && echo "$output" || {
            echo "$output"
            echo "$output" | grep -q 'already contains version'
          }

      - name: Locate plugin archive
        id: archive
        working-directory: plugins/idea
        run: |
          DIST=$(ls build/distributions/intellij-dpg-*.zip | head -1)
          echo "path=plugins/idea/$DIST" >> $GITHUB_OUTPUT

      - name: Upload plugin archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: ${{ steps.archive.outputs.path }}
