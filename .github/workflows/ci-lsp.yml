name: CI / LSP

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lsp:
    name: dpg-lsp Go server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: lang/lsp/go.mod
          cache-dependency-path: lang/lsp/go.sum

      - name: Vet
        working-directory: lang/lsp
        run: go vet ./...

      - name: Build
        working-directory: lang/lsp
        run: go build ./...

      - name: Test
        working-directory: lang/lsp
        run: go test ./...
