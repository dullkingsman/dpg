name: Editor / Grammar

on:
  push:
    branches: [master]
    paths:
      - "lang/grammar/**"
  pull_request:
    branches: [master]
    paths:
      - "lang/grammar/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  grammar:
    name: Tree-sitter grammar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lang/grammar/package.json

      - name: Install dependencies
        working-directory: lang/grammar
        run: npm install

      - name: Generate parser
        working-directory: lang/grammar
        run: npx tree-sitter generate

      - name: Run corpus tests
        working-directory: lang/grammar
        run: npx tree-sitter test

      - name: Check parser is up to date
        working-directory: lang/grammar
        run: |
          if ! git diff --exit-code src/parser.c; then
            echo "::error::parser.c is stale — run 'npx tree-sitter generate' in lang/grammar and commit the result"
            exit 1
          fi
