name: Release / VS Code

on:
  push:
    tags:
      - 'vscode-v[0-9]*.[0-9]*.[0-9]*'
  workflow_call:
    inputs:
      tag:
        description: 'vscode-v* tag to publish (e.g. vscode-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Package and publish VS Code extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag metadata
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#vscode-v}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-.*\.([0-9]+)$ ]]; then
            # VS Marketplace rejects pre-release suffixes; encode alpha number into patch
            # e.g. 0.5.2-alpha.9 → 0.5.9
            echo "marketplace_version=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[4]}" >> $GITHUB_OUTPUT
            echo "prerelease=true"           >> $GITHUB_OUTPUT
            echo "vsce_flags=--pre-release"  >> $GITHUB_OUTPUT
          else
            echo "marketplace_version=$VERSION" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "vsce_flags="      >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugins/vscode/package-lock.json

      - name: Install dependencies
        working-directory: plugins/vscode
        run: npm ci

      - name: Type-check
        working-directory: plugins/vscode
        run: npm run compile

      - name: Stamp version
        working-directory: plugins/vscode
        run: npm version "${{ steps.meta.outputs.marketplace_version }}" --no-git-tag-version

      - name: Bundle extension
        working-directory: plugins/vscode
        run: npm run bundle

      - name: Package extension
        working-directory: plugins/vscode
        run: npx vsce package ${{ steps.meta.outputs.vsce_flags }}

      - name: Publish to VS Code Marketplace
        working-directory: plugins/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          output=$(npx vsce publish ${{ steps.meta.outputs.vsce_flags }} --pat "$VSCE_PAT" 2>&1) && echo "$output" || {
            echo "$output"
            echo "$output" | grep -q 'already exists'
          }

      - name: Upload .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: plugins/vscode/*.vsix
