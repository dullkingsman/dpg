name: Release / LSP

on:
  push:
    tags:
      - 'lsp-v[0-9]*.[0-9]*.[0-9]*'
  workflow_call:
    inputs:
      tag:
        description: 'lsp-v* tag to release (e.g. lsp-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-lsp:
    name: Build dpg-lsp (all platforms)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag metadata
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#lsp-v}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: lang/lsp/go.mod
          cache-dependency-path: lang/lsp/go.sum

      - name: Build dpg-lsp
        working-directory: lang/lsp
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          COMMIT="${GITHUB_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X 'github.com/dullkingsman/dpg-lsp/internal/version.Version=${VERSION}' \
            -X 'github.com/dullkingsman/dpg-lsp/internal/version.Commit=${COMMIT}' \
            -X 'github.com/dullkingsman/dpg-lsp/internal/version.Date=${DATE}'"

          mkdir -p dist

          targets=(
            "linux   amd64 dpg-lsp-linux-amd64.tar.gz"
            "linux   arm64 dpg-lsp-linux-arm64.tar.gz"
            "darwin  amd64 dpg-lsp-darwin-amd64.tar.gz"
            "darwin  arm64 dpg-lsp-darwin-arm64.tar.gz"
            "windows amd64 dpg-lsp-windows-amd64.zip"
          )

          for entry in "${targets[@]}"; do
            read -r os arch archive <<< "$entry"
            if [ "$os" = "windows" ]; then
              bin="dpg-lsp.exe"
            else
              bin="dpg-lsp"
            fi
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "$LDFLAGS" -o "dist/$bin" ./cmd/dpg-lsp
            if [ "$os" = "windows" ]; then
              (cd dist && zip "$archive" "$bin" && rm "$bin")
            else
              (cd dist && tar czf "$archive" "$bin" && rm "$bin")
            fi
          done

      - name: Checksums
        run: |
          cd lang/lsp/dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            lang/lsp/dist/dpg-lsp-*.tar.gz
            lang/lsp/dist/dpg-lsp-*.zip
            lang/lsp/dist/checksums.txt
